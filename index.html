<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registre d'activités — Destiny</title>
</head>
<body>
<div id="app"></div>

<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');

body{margin:0;}

:root{
  --bg:#0A0C10;
  --bg-glow: radial-gradient(ellipse 900px 500px at 50% -10%, rgba(63,211,224,0.10), transparent 60%);
  --panel:#12151C;
  --panel-2:#171B24;
  --border:#232833;
  --text:#EDEFF3;
  --muted:#7C8494;
  --gold:#E8B94D;
  --gold-dim: rgba(232,185,77,0.14);
  --speedrun:#3FD3E0;
  --speedrun-dim: rgba(63,211,224,0.12);
  --lowman:#B084F5;
  --lowman-dim: rgba(176,132,245,0.12);
  --pvp:#FF6B4A;
  --pvp-dim: rgba(255,107,74,0.12);
}

#app{
  font-family:'Inter',sans-serif;
  background: var(--bg-glow), var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:36px 20px 60px;
  box-sizing:border-box;
}

*{box-sizing:border-box;}

.wrap{max-width:920px;margin:0 auto;}

.hero{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:20px;
  margin-bottom:28px;
  flex-wrap:wrap;
  border-bottom:1px solid var(--border);
  padding-bottom:22px;
}
.hero-title{
  font-family:'Oswald',sans-serif;
  font-weight:700;
  letter-spacing:1px;
  text-transform:uppercase;
  font-size:34px;
  line-height:1;
  margin:0;
  background:linear-gradient(90deg,#F1F3F6,#9BA4B4);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}
.hero-sub{
  color:var(--muted);
  font-size:13px;
  margin-top:6px;
  letter-spacing:.3px;
}

.progress-ring-wrap{display:flex;align-items:center;gap:14px;}
.progress-ring{position:relative;width:74px;height:74px;}
.progress-ring svg{transform:rotate(-90deg);}
.progress-ring .pct{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Oswald',sans-serif;font-size:17px;font-weight:600;color:var(--gold);
}
.progress-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.progress-count{font-family:'Oswald',sans-serif;font-size:15px;color:var(--text);margin-top:2px;}

.tabs{
  display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap;
}
.tab{
  font-family:'Oswald',sans-serif;
  text-transform:uppercase;
  letter-spacing:.6px;
  font-size:13px;
  font-weight:600;
  padding:9px 16px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--panel);
  color:var(--muted);
  cursor:pointer;
  transition:all .15s ease;
  display:flex;align-items:center;gap:8px;
}
.tab:hover{color:var(--text);border-color:#333a48;}
.tab .dot{width:7px;height:7px;border-radius:2px;transform:rotate(45deg);background:var(--muted);}
.tab.active{color:var(--text);background:var(--panel-2);}
.tab[data-cat="all"].active{border-color:#4b5364;}
.tab[data-cat="Speedrun"].active{border-color:var(--speedrun);}
.tab[data-cat="Speedrun"].active .dot{background:var(--speedrun);}
.tab[data-cat="Lowman"].active{border-color:var(--lowman);}
.tab[data-cat="Lowman"].active .dot{background:var(--lowman);}
.tab[data-cat="PvP"].active{border-color:var(--pvp);}
.tab[data-cat="PvP"].active .dot{background:var(--pvp);}
.tab .count{color:var(--muted);font-weight:400;font-size:12px;}

.add-bar{
  display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px;
}
.add-bar input, .add-bar select{
  font-family:'Inter',sans-serif;
  background:var(--panel-2);
  border:1px solid var(--border);
  color:var(--text);
  border-radius:6px;
  padding:9px 11px;
  font-size:13px;
  outline:none;
}
.add-bar input:focus, .add-bar select:focus{border-color:var(--gold);}
.add-bar input.name{flex:1.4;min-width:160px;}
.add-bar input.objective{flex:2;min-width:180px;}
.add-bar select{flex:0 0 130px;}
.add-btn{
  font-family:'Oswald',sans-serif;
  text-transform:uppercase;
  letter-spacing:.6px;
  font-weight:600;
  font-size:13px;
  background:var(--gold);
  color:#1a1305;
  border:none;
  border-radius:6px;
  padding:9px 18px;
  cursor:pointer;
  transition:filter .15s ease;
  flex:0 0 auto;
}
.add-btn:hover{filter:brightness(1.1);}

.cat-section{margin-bottom:26px;}
.cat-heading{
  font-family:'Oswald',sans-serif;
  text-transform:uppercase;
  font-size:13px;
  letter-spacing:1.5px;
  color:var(--muted);
  display:flex;align-items:center;gap:10px;
  margin:0 0 10px 2px;
}
.cat-heading .bar{flex:1;height:1px;background:var(--border);}

.card-list{display:flex;flex-direction:column;gap:8px;}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-left:3px solid var(--muted);
  border-radius:8px;
  padding:13px 14px;
  display:flex;
  align-items:center;
  gap:14px;
  transition:border-color .15s ease, background .15s ease;
}
.card.cat-Speedrun{border-left-color:var(--speedrun);}
.card.cat-Lowman{border-left-color:var(--lowman);}
.card.cat-PvP{border-left-color:var(--pvp);}
.card.done{background:var(--panel-2);}
.card.done .name{color:var(--muted);text-decoration:line-through;text-decoration-color:#3a4150;}

.card-main{flex:1;min-width:0;}
.name{
  font-family:'Oswald',sans-serif;
  font-size:15px;
  font-weight:500;
  letter-spacing:.2px;
  margin-bottom:2px;
}
.objective{
  font-size:12.5px;
  color:var(--muted);
  outline:none;
  border-radius:4px;
  padding:1px 3px;
  margin:-1px -3px;
}
.objective:focus{background:var(--panel-2);color:var(--text);}
.objective:empty:before{content:"Ajouter un objectif…";color:#4a5162;}

.del-btn{
  background:none;border:none;color:#4a5162;cursor:pointer;
  font-size:16px;line-height:1;padding:4px;flex:0 0 auto;
  transition:color .15s ease;
}
.del-btn:hover{color:var(--pvp);}

.toggle-btn{
  flex:0 0 auto;
  font-family:'Oswald',sans-serif;
  text-transform:uppercase;
  font-size:11.5px;
  font-weight:600;
  letter-spacing:.8px;
  padding:9px 14px;
  border-radius:7px;
  border:1px solid #333a48;
  background:transparent;
  color:var(--muted);
  cursor:pointer;
  display:flex;align-items:center;gap:7px;
  min-width:128px;
  justify-content:center;
  transition:all .18s ease;
  position:relative;
  overflow:hidden;
}
.toggle-btn:hover{border-color:var(--gold);color:var(--text);}
.toggle-btn .check{
  width:13px;height:13px;border-radius:3px;border:1.5px solid currentColor;
  display:flex;align-items:center;justify-content:center;flex:0 0 auto;
}
.toggle-btn .check svg{width:9px;height:9px;opacity:0;transition:opacity .15s ease;}
.toggle-btn.done{
  background:var(--gold-dim);
  border-color:var(--gold);
  color:var(--gold);
}
.toggle-btn.done .check{background:var(--gold);border-color:var(--gold);color:#1a1305;}
.toggle-btn.done .check svg{opacity:1;}
.toggle-btn.pulse{animation:pulse .35s ease;}
@keyframes pulse{
  0%{transform:scale(1);}
  40%{transform:scale(1.06);}
  100%{transform:scale(1);}
}

.empty{
  text-align:center;
  color:var(--muted);
  font-size:13px;
  padding:40px 20px;
  border:1px dashed var(--border);
  border-radius:10px;
}

.footer-note{
  text-align:center;color:#4a5162;font-size:11px;margin-top:30px;letter-spacing:.3px;
}
.shared-badge{
  display:inline-block;margin-left:8px;color:#3FD3E0;font-size:11px;letter-spacing:.3px;
}
.setup-banner{
  background:#2A1B1B;border:1px solid #6B3A3A;color:#F1B8B8;
  border-radius:8px;padding:14px 16px;margin-bottom:20px;font-size:13px;line-height:1.6;
}
.setup-banner code{background:#0A0C10;padding:1px 5px;border-radius:4px;color:var(--gold);}
.sync-status{font-size:11px;color:var(--muted);margin-left:8px;}
.sync-status.err{color:var(--pvp);}

@media (max-width:520px){
  .hero{flex-direction:column;align-items:flex-start;}
  .card{flex-wrap:wrap;}
  .toggle-btn{min-width:112px;}
}
</style>

<script>
(function(){
  // ====== CONFIGURATION JSONBIN.IO — à remplir avant de publier ======
  // 1. Crée un compte gratuit sur https://jsonbin.io
  // 2. Crée un bin avec le contenu: {"activities":[]}
  // 3. Colle ton Bin ID et ta X-Master-Key ci-dessous
  const JSONBIN_ID = "6a4598b8da38895dfe1eec4d";
  const JSONBIN_KEY = "$2a$10$clxd1Got5R6jlA5NBeeQA.9dayCX642A6RuUZ.wnjjYeGEsKGJ6E.";
  const CONFIGURED = JSONBIN_ID !== "6a4598b8da38895dfe1eec4d" && JSONBIN_KEY !== "$2a$10$clxd1Got5R6jlA5NBeeQA.9dayCX642A6RuUZ.wnjjYeGEsKGJ6E.";
  const API_BASE = `https://api.jsonbin.io/v3/b/${JSONBIN_ID}`;
  // =====================================================================

  const CATS = ["Speedrun","Lowman","PvP"];
  const CAT_COLOR = {Speedrun:"var(--speedrun)", Lowman:"var(--lowman)", PvP:"var(--pvp)"};
  const STORAGE_KEY = "destiny-activities-v1";
  let state = { activities: [], filter: "all" };
  let loaded = false;

  const seed = [
    {id:crypto.randomUUID(), category:"Speedrun", name:"Le Dévoreur de Mondes (Vault of Glass)", objective:"Sous 10 minutes", done:false},
    {id:crypto.randomUUID(), category:"Speedrun", name:"Racine des Cauchemars", objective:"Sous 15 minutes", done:false},
    {id:crypto.randomUUID(), category:"Lowman", name:"Le Festin du Roi en Trio", objective:"3 joueurs, aucune mort", done:false},
    {id:crypto.randomUUID(), category:"Lowman", name:"Vœu du Disciple en Solo", objective:"Solo flawless", done:true},
    {id:crypto.randomUUID(), category:"PvP", name:"Passage Adepte (Épreuves)", objective:"Flawless", done:false},
    {id:crypto.randomUUID(), category:"PvP", name:"Compétitif — Rang", objective:"Atteindre Ascendant I", done:false},
  ];

  let lastSavedJSON = "";
  let syncState = "idle"; // idle | syncing | error

  async function load(){
    if(!CONFIGURED){
      state.activities = seed;
      loaded = true;
      render();
      return;
    }
    try{
      syncState = "syncing";
      const res = await fetch(`${API_BASE}/latest`, { headers: { "X-Master-Key": JSONBIN_KEY } });
      if(!res.ok) throw new Error("fetch failed");
      const data = await res.json();
      const incoming = (data.record && data.record.activities) ? data.record.activities : seed;
      const incomingJSON = JSON.stringify(incoming);
      syncState = "idle";
      if(incomingJSON !== lastSavedJSON){
        state.activities = incoming;
        lastSavedJSON = incomingJSON;
        const shouldRerender = !loaded || !editingActive();
        loaded = true;
        if(shouldRerender) render();
      } else if(!loaded){
        state.activities = incoming;
        loaded = true;
        render();
      }
    }catch(e){
      syncState = "error";
      if(!loaded){ state.activities = seed; loaded = true; render(); }
      else updateSyncBadge();
    }
  }

  function editingActive(){
    const el = document.activeElement;
    return !!(el && el.getAttribute && el.getAttribute('contenteditable') === 'true');
  }

  async function persist(){
    const json = JSON.stringify(state.activities);
    lastSavedJSON = json;
    if(!CONFIGURED) return;
    try{
      syncState = "syncing"; updateSyncBadge();
      await fetch(API_BASE, {
        method: "PUT",
        headers: { "Content-Type": "application/json", "X-Master-Key": JSONBIN_KEY },
        body: JSON.stringify({ activities: state.activities })
      });
      syncState = "idle"; updateSyncBadge();
    }catch(e){
      syncState = "error"; updateSyncBadge();
    }
  }

  function updateSyncBadge(){
    const el = document.getElementById('sync-status');
    if(!el) return;
    el.classList.toggle('err', syncState === "error");
    el.textContent = syncState === "syncing" ? "· synchronisation…" : syncState === "error" ? "· hors ligne, réessai en cours" : "· synchronisé";
  }

  function counts(){
    const c = {all:{total:0,done:0}};
    CATS.forEach(cat=>c[cat]={total:0,done:0});
    state.activities.forEach(a=>{
      c.all.total++; if(a.done) c.all.done++;
      if(c[a.category]){ c[a.category].total++; if(a.done) c[a.category].done++; }
    });
    return c;
  }

  function ringSVG(pct){
    const r=30, circ=2*Math.PI*r;
    const offset = circ - (pct/100)*circ;
    return `<svg width="74" height="74">
      <circle cx="37" cy="37" r="${r}" fill="none" stroke="#232833" stroke-width="6"/>
      <circle cx="37" cy="37" r="${r}" fill="none" stroke="var(--gold)" stroke-width="6"
        stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"/>
    </svg>`;
  }

  function checkSVG(){
    return `<svg viewBox="0 0 10 10"><polyline points="1,5 4,8 9,2" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  }

  function cardHTML(a){
    return `
    <div class="card cat-${a.category} ${a.done?'done':''}" data-id="${a.id}">
      <div class="card-main">
        <div class="name">${escapeHtml(a.name)}</div>
        <div class="objective" contenteditable="true" data-field="objective">${escapeHtml(a.objective||"")}</div>
      </div>
      <button class="del-btn" data-action="delete" title="Supprimer">✕</button>
      <button class="toggle-btn ${a.done?'done':''}" data-action="toggle">
        <span class="check">${checkSVG()}</span>
        <span>${a.done?'Terminé':'Non fait'}</span>
      </button>
    </div>`;
  }

  function escapeHtml(s){
    return (s||"").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function render(){
    if(!loaded){
      document.getElementById('app').innerHTML = `<div class="wrap"><p style="color:var(--muted)">Chargement…</p></div>`;
      return;
    }
    const c = counts();
    const pct = c.all.total ? Math.round(100*c.all.done/c.all.total) : 0;

    const catsToShow = state.filter === "all" ? CATS : [state.filter];

    let sections = catsToShow.map(cat=>{
      const items = state.activities.filter(a=>a.category===cat);
      if(items.length===0) return "";
      return `
        <div class="cat-section">
          <div class="cat-heading"><span style="color:${CAT_COLOR[cat]}">${cat}</span><span class="bar"></span><span>${c[cat].done}/${c[cat].total}</span></div>
          <div class="card-list">${items.map(cardHTML).join("")}</div>
        </div>`;
    }).join("");

    if(state.activities.filter(a=> state.filter==="all" || a.category===state.filter).length === 0){
      sections = `<div class="empty">Aucune activité pour l'instant. Ajoute-en une ci-dessus.</div>`;
    }

    document.getElementById('app').innerHTML = `
      <div class="wrap">
        ${CONFIGURED ? "" : `<div class="setup-banner">⚠️ JSONBin n'est pas encore configuré — les données ne sont sauvegardées que dans ce navigateur, pas partagées. Ouvre le fichier HTML, trouve <code>JSONBIN_ID</code> et <code>JSONBIN_KEY</code> tout en haut du script, et remplace-les par tes identifiants gratuits de <a href="https://jsonbin.io" target="_blank" style="color:#F1B8B8">jsonbin.io</a>.</div>`}
        <div class="hero">
          <div>
            <h1 class="hero-title">Registre d'activités</h1>
            <div class="hero-sub">Speedrun · Lowman · PvP — suis tes objectifs Destiny <span class="shared-badge">● Partagé<span class="sync-status" id="sync-status"></span></span></div>
          </div>
          <div class="progress-ring-wrap">
            <div class="progress-ring">${ringSVG(pct)}<div class="pct">${pct}%</div></div>
            <div>
              <div class="progress-label">Progression</div>
              <div class="progress-count">${c.all.done} / ${c.all.total} faites</div>
            </div>
          </div>
        </div>

        <div class="tabs">
          <div class="tab ${state.filter==='all'?'active':''}" data-cat="all"><span class="dot"></span>Toutes<span class="count">${c.all.total}</span></div>
          ${CATS.map(cat=>`<div class="tab ${state.filter===cat?'active':''}" data-cat="${cat}"><span class="dot"></span>${cat}<span class="count">${c[cat].total}</span></div>`).join("")}
        </div>

        <div class="add-bar">
          <input class="name" id="new-name" placeholder="Nom de l'activité" />
          <input class="objective" id="new-objective" placeholder="Objectif (ex: sub 15 min, solo flawless…)" />
          <select id="new-category">
            ${CATS.map(cat=>`<option value="${cat}">${cat}</option>`).join("")}
          </select>
          <button class="add-btn" id="add-activity">+ Ajouter</button>
        </div>

        ${sections}
        <div class="footer-note">${CONFIGURED ? "Sauvegardé automatiquement · visible par toute personne ayant ce lien" : "Configure JSONBin pour activer le partage"}</div>
      </div>
    `;

    bindEvents();
    updateSyncBadge();
  }

  function bindEvents(){
    document.querySelectorAll('.tab').forEach(t=>{
      t.addEventListener('click', ()=>{ state.filter = t.dataset.cat; render(); });
    });

    document.getElementById('add-activity').addEventListener('click', addActivity);
    ['new-name','new-objective'].forEach(id=>{
      document.getElementById(id).addEventListener('keydown', e=>{ if(e.key==='Enter') addActivity(); });
    });

    document.querySelectorAll('.card').forEach(card=>{
      const id = card.dataset.id;
      const toggleBtn = card.querySelector('[data-action="toggle"]');
      toggleBtn.addEventListener('click', ()=>{
        const a = state.activities.find(x=>x.id===id);
        a.done = !a.done;
        persist();
        toggleBtn.classList.add('pulse');
        renderPreserveScroll();
      });
      card.querySelector('[data-action="delete"]').addEventListener('click', ()=>{
        state.activities = state.activities.filter(x=>x.id!==id);
        persist();
        render();
      });
      const objEl = card.querySelector('[data-field="objective"]');
      objEl.addEventListener('blur', ()=>{
        const a = state.activities.find(x=>x.id===id);
        a.objective = objEl.textContent.trim();
        persist();
      });
      objEl.addEventListener('keydown', e=>{
        if(e.key==='Enter'){ e.preventDefault(); objEl.blur(); }
      });
    });
  }

  function renderPreserveScroll(){
    const y = window.scrollY;
    render();
    window.scrollTo(0,y);
  }

  function addActivity(){
    const nameEl = document.getElementById('new-name');
    const objEl = document.getElementById('new-objective');
    const catEl = document.getElementById('new-category');
    const name = nameEl.value.trim();
    if(!name) { nameEl.focus(); return; }
    state.activities.push({
      id: crypto.randomUUID(),
      category: catEl.value,
      name: name,
      objective: objEl.value.trim(),
      done:false
    });
    persist();
    nameEl.value=""; objEl.value="";
    render();
  }

  load();
  setInterval(load, 5000);
})();

</script>
</body>
</html>
